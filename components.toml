# Registry of locally-installed open-source CLI components.
# Add your own [[component]] blocks below, or import a preset.
#
# Example minimal component:
#
# [[component]]
# name = "mytool"
# desc = "My CLI tool"
# binary = "mytool"
# local_cmd = "mytool --version"
# local_regex = '(\d+\.\d+\.\d+)'
# upgrade_cmd = "curl -fsSL https://example.com/install.sh | sh"
#
# [component.latest]
# type = "github_release"
# repo = "owner/repo"
# tag_prefix = "v"
